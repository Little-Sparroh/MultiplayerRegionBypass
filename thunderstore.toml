[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "RegionBypass"
description = "Bypasses the region lock in the server browser, allowing players to see and join lobbies from all regions worldwide."
websiteUrl = "https://github.com/Little-Sparroh/RegionBypass"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/RegionBypass.dll"
target = "BepInEx/plugins/RegionBypass.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]


